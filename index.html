<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Campanhas 2026 — Grupo Flex</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f0;color:#1a1a1a;height:100vh;display:flex;align-items:stretch}
.app{display:flex;width:100%;height:100vh;background:#f5f5f0;overflow:hidden}
.sidebar{width:200px;background:#fff;border-right:0.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px;border-bottom:0.5px solid rgba(0,0,0,.12)}
.logo-title{font-size:13px;font-weight:500;color:#1a1a1a}
.logo-sub{font-size:11px;color:#888;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;color:#666;transition:background .15s;border-radius:6px;margin:1px 6px}
.nav-item:hover{background:#f5f5f0;color:#1a1a1a}
.nav-item.active{background:#e6f1fb;color:#185fa5}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-section{padding:16px 12px 4px;font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.12);gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:500}
.btn{padding:6px 12px;border:0.5px solid rgba(0,0,0,.25);border-radius:8px;background:#fff;color:#1a1a1a;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#e6f1fb;border-color:#b5d4f4;color:#185fa5}
.btn-primary:hover{opacity:.85}
.content{flex:1;overflow:auto;padding:16px}
.area-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.area-fin{background:#1D9E75}.area-ate{background:#7F77DD}.area-aco{background:#BA7517}.area-com{background:#378ADD}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-header-day{text-align:center;font-size:11px;font-weight:500;color:#888;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,.1)}
.cal-cell{min-height:90px;border-right:0.5px solid rgba(0,0,0,.08);border-bottom:0.5px solid rgba(0,0,0,.08);padding:4px;cursor:pointer;transition:background .1s;background:#fff}
.cal-cell:hover{background:#fafafa}
.cal-cell.other-month{background:#f9f9f7;opacity:.5}
.cal-cell.today{background:#e6f1fb}
.day-num{font-size:11px;color:#888;margin-bottom:2px;font-weight:500}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500}
.cal-event.fin{background:#1D9E75}.cal-event.ate{background:#7F77DD}.cal-event.aco{background:#BA7517}.cal-event.com{background:#378ADD}
.month-nav{display:flex;align-items:center;gap:8px}
.month-title{font-size:14px;font-weight:500;min-width:130px;text-align:center}
.panel{width:300px;background:#fff;border-left:0.5px solid rgba(0,0,0,.12);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.panel-header{padding:14px 16px;border-bottom:0.5px solid rgba(0,0,0,.12);display:flex;justify-content:space-between;align-items:center}
.panel-body{flex:1;overflow-y:auto;padding:16px}
.panel-field{margin-bottom:14px}
.panel-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.panel-value{font-size:13px;color:#1a1a1a}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-fin{background:#E1F5EE;color:#0F6E56}.badge-ate{background:#EEEDFE;color:#3C3489}.badge-aco{background:#FAEEDA;color:#854F0B}.badge-com{background:#E6F1FB;color:#185FA5}
.badge-status{background:#f5f5f0;color:#666}
.badge-alta{background:#FAECE7;color:#993C1D}.badge-media{background:#FAEEDA;color:#854F0B}.badge-baixa{background:#EAF3DE;color:#3B6D11}.badge-critica{background:#FCEBEB;color:#A32D2D}
.close-btn{width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;color:#888;font-size:16px}
.close-btn:hover{background:#f5f5f0}
.kanban-wrap{display:flex;gap:10px;overflow-x:auto;height:100%}
.kan-col{min-width:170px;background:#f5f5f0;border-radius:8px;padding:10px;flex-shrink:0}
.kan-col-title{font-size:11px;font-weight:500;color:#888;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.kan-card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .1s}
.kan-card:hover{border-color:rgba(0,0,0,.2)}
.kan-card-title{font-size:12px;font-weight:500;margin-bottom:6px;line-height:1.4}
.kan-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-card{background:#f5f5f0;border-radius:8px;padding:14px}
.dash-num{font-size:24px;font-weight:500;color:#1a1a1a}
.dash-lbl{font-size:11px;color:#888;margin-top:2px}
.bar-wrap{margin-bottom:16px;background:#fff;border-radius:8px;padding:14px;border:0.5px solid rgba(0,0,0,.1)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:#888;width:80px;flex-shrink:0}
.bar-bg{flex:1;background:#f5f5f0;border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-count{font-size:12px;font-weight:500;color:#888;width:16px;text-align:right}
.list-table{width:100%;border-collapse:collapse;font-size:12px}
.list-table th{text-align:left;padding:8px;border-bottom:0.5px solid rgba(0,0,0,.1);font-size:11px;font-weight:500;color:#888}
.list-table td{padding:8px;border-bottom:0.5px solid rgba(0,0,0,.08);color:#1a1a1a}
.list-table tr:hover td{background:#fafafa}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:20px;width:420px;max-height:80vh;overflow-y:auto;border:0.5px solid rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-label{font-size:11px;font-weight:500;color:#888;margin-bottom:4px;display:block}
.form-input{width:100%;padding:7px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit}
.form-input:focus{outline:none;border-color:#378ADD}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
</style>
</head>
<body>
<div class="app" id="app">
<div class="sidebar">
  <div class="logo">
    <div class="logo-title">Campanhas 2026</div>
    <div class="logo-sub">Grupo Flex</div>
  </div>
  <div style="padding:8px 6px;flex:1">
    <div class="nav-section">Menu</div>
    <div class="nav-item active" onclick="setView('calendar')" id="nav-calendar">
      <svg class="nav-icon" fill="none" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 2v2M11 2v2M2 7h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Calendário
    </div>
    <div class="nav-item" onclick="setView('kanban')" id="nav-kanban">
      <svg class="nav-icon" fill="none" viewBox="0 0 16 16"><rect x="1" y="3" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="6" y="3" width="4" height="7" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="11" y="3" width="4" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      Kanban
    </div>
    <div class="nav-item" onclick="setView('list')" id="nav-list">
      <svg class="nav-icon" fill="none" viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Lista
    </div>
    <div class="nav-item" onclick="setView('dashboard')" id="nav-dashboard">
      <svg class="nav-icon" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
      Dashboard
    </div>
    <div class="nav-section">Áreas</div>
    <div style="padding:4px 12px">
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666"><span class="area-dot area-fin"></span>Financeiro<span style="margin-left:auto;font-size:11px" id="cnt-fin">1</span></div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666"><span class="area-dot area-ate"></span>Atendimento<span style="margin-left:auto;font-size:11px" id="cnt-ate">1</span></div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666"><span class="area-dot area-aco"></span>Acordos<span style="margin-left:auto;font-size:11px" id="cnt-aco">1</span></div>
      <div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;color:#666"><span class="area-dot area-com"></span>Comercial<span style="margin-left:auto;font-size:11px" id="cnt-com">1</span></div>
    </div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title" id="topbar-title">Calendário</span>
      <div class="month-nav" id="month-nav">
        <button class="btn" onclick="prevMonth()">‹</button>
        <span class="month-title" id="month-title"></span>
        <button class="btn" onclick="nextMonth()">›</button>
        <button class="btn" onclick="goToday()">Hoje</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <select id="filter-area" class="form-input" style="width:120px;font-size:12px" onchange="renderView()">
        <option value="">Todas as áreas</option>
        <option value="fin">Financeiro</option>
        <option value="ate">Atendimento</option>
        <option value="aco">Acordos</option>
        <option value="com">Comercial</option>
      </select>
      <button class="btn btn-primary" onclick="openNewModal()">+ Nova campanha</button>
    </div>
  </div>
  <div class="content" id="view-content"></div>
</div>
<div class="panel" id="side-panel" style="display:none">
  <div class="panel-header">
    <span style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px" id="panel-title">Detalhes</span>
    <div class="close-btn" onclick="closePanel()">×</div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>
<div id="modal-container"></div>
</div>
<script>
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const AREAS={fin:{name:'Financeiro',badge:'badge-fin'},ate:{name:'Atendimento',badge:'badge-ate'},aco:{name:'Acordos',badge:'badge-aco'},com:{name:'Comercial',badge:'badge-com'}};
const PRIO_BADGE={alta:'badge-alta','média':'badge-media',media:'badge-media',baixa:'badge-baixa','crítica':'badge-critica',critica:'badge-critica'};
const BAR_COLORS={fin:'#1D9E75',ate:'#7F77DD',aco:'#BA7517',com:'#378ADD'};
let campaigns=[
  {id:1,title:'Organização Financeira de Janeiro',area:'fin',type:'Institucional',status:'Planejada',priority:'alta',responsible:'Ana Lima',start:'2026-01-05',end:'2026-01-20',description:'Organização e planejamento financeiro para o início do ano.',objective:'Estruturar metas financeiras Q1',channels:['WhatsApp','E-mail'],comments:[]},
  {id:2,title:'Campanha Volta Comercial',area:'com',type:'Comercial',status:'Ideia',priority:'média',responsible:'Carlos Souza',start:'2026-01-15',end:'2026-02-05',description:'Campanha de retomada comercial pós-feriados.',objective:'Reativar base de clientes',channels:['Redes sociais','Tráfego pago'],comments:[]},
  {id:3,title:'Relacionamento com Clientes',area:'ate',type:'Relacionamento',status:'Em produção',priority:'média',responsible:'Beatriz Costa',start:'2026-02-01',end:'2026-02-28',description:'Campanha de relacionamento e satisfação com clientes.',objective:'Aumentar NPS em 10 pontos',channels:['WhatsApp','Ligação'],comments:[]},
  {id:4,title:'Acordos Primeiro Trimestre',area:'aco',type:'Retenção',status:'Planejada',priority:'alta',responsible:'Diego Nunes',start:'2026-01-10',end:'2026-03-31',description:'Campanha de acordos e negociações para Q1.',objective:'Reduzir inadimplência 15%',channels:['WhatsApp','SMS','Ligação'],comments:[]},
];
let nextId=5,currentView='calendar',currentMonth=0,currentYear=2026;
function setView(v){currentView=v;document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));document.getElementById('nav-'+v)?.classList.add('active');document.getElementById('topbar-title').textContent={calendar:'Calendário',kanban:'Kanban',list:'Lista de Campanhas',dashboard:'Dashboard'}[v];document.getElementById('month-nav').style.display=v==='calendar'?'flex':'none';closePanel();renderView();}
function getFiltered(){const a=document.getElementById('filter-area')?.value||'';return a?campaigns.filter(c=>c.area===a):campaigns;}
function renderView(){if(currentView==='calendar')renderCalendar();else if(currentView==='kanban')renderKanban();else if(currentView==='list')renderList();else renderDashboard();}
function renderCalendar(){
  document.getElementById('month-title').textContent=MONTHS[currentMonth]+' '+currentYear;
  const first=new Date(currentYear,currentMonth,1).getDay(),days=new Date(currentYear,currentMonth+1,0).getDate(),filtered=getFiltered(),today=new Date();
  let html=`<div class="cal-grid">${DAYS.map(d=>`<div class="cal-header-day">${d}</div>`).join('')}`;
  for(let i=0;i<first;i++)html+=`<div class="cal-cell other-month"></div>`;
  for(let d=1;d<=days;d++){const ds=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const isT=today.getDate()===d&&today.getMonth()===currentMonth&&today.getFullYear()===currentYear;const evs=filtered.filter(c=>c.start<=ds&&(c.end||c.start)>=ds);html+=`<div class="cal-cell${isT?' today':''}" onclick="dayClick('${ds}')"><div class="day-num">${d}</div>${evs.map(c=>`<div class="cal-event ${c.area}" onclick="event.stopPropagation();openPanel(${c.id})">${c.title}</div>`).join('')}</div>`;}
  const rem=(7-(first+days)%7)%7;for(let i=0;i<rem;i++)html+=`<div class="cal-cell other-month"></div>`;
  document.getElementById('view-content').innerHTML=html+'</div>';
}
function renderKanban(){
  const COLS=['Ideia','Planejada','Em produção','Em aprovação','Agendada','Em andamento','Finalizada','Cancelada'],filtered=getFiltered();
  let html='<div class="kanban-wrap">';
  COLS.forEach(col=>{const cards=filtered.filter(c=>c.status===col);html+=`<div class="kan-col"><div class="kan-col-title"><span>${col}</span><span style="background:#fff;border-radius:10px;padding:0 6px">${cards.length}</span></div>${cards.map(c=>`<div class="kan-card" onclick="openPanel(${c.id})"><div class="kan-card-title">${c.title}</div><div class="kan-card-meta"><span class="badge ${AREAS[c.area].badge}">${AREAS[c.area].name}</span><span class="badge ${PRIO_BADGE[c.priority.toLowerCase()]||'badge-status'}">${c.priority}</span></div><div style="font-size:11px;color:#aaa;margin-top:6px">${c.start}</div></div>`).join('')}<div style="text-align:center;padding:6px 0;font-size:11px;color:#aaa;cursor:pointer" onclick="openNewModalStatus('${col}')">+ Adicionar</div></div>`;});
  document.getElementById('view-content').innerHTML=html+'</div>';
}
function renderList(){
  const filtered=getFiltered();
  document.getElementById('view-content').innerHTML=`<div style="background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,.1);overflow:hidden"><table class="list-table"><tr><th>Campanha</th><th>Área</th><th>Tipo</th><th>Status</th><th>Prioridade</th><th>Início</th><th>Fim</th><th></th></tr>${filtered.map(c=>`<tr onclick="openPanel(${c.id})" style="cursor:pointer"><td style="font-weight:500">${c.title}</td><td><span class="badge ${AREAS[c.area].badge}">${AREAS[c.area].name}</span></td><td style="color:#888">${c.type}</td><td><span class="badge badge-status">${c.status}</span></td><td><span class="badge ${PRIO_BADGE[c.priority.toLowerCase()]||'badge-status'}">${c.priority}</span></td><td style="color:#888">${c.start}</td><td style="color:#888">${c.end||'—'}</td><td><button class="btn" onclick="event.stopPropagation();deleteCampaign(${c.id})" style="padding:2px 8px;font-size:11px">×</button></td></tr>`).join('')}</table></div>`;
}
function renderDashboard(){
  const total=campaigns.length,ongoing=campaigns.filter(c=>c.status==='Em andamento').length,done=campaigns.filter(c=>c.status==='Finalizada').length,planned=campaigns.filter(c=>c.status==='Planejada').length;
  const bc={fin:campaigns.filter(c=>c.area==='fin').length,ate:campaigns.filter(c=>c.area==='ate').length,aco:campaigns.filter(c=>c.area==='aco').length,com:campaigns.filter(c=>c.area==='com').length};
  const mx=Math.max(...Object.values(bc),1);
  document.getElementById('view-content').innerHTML=`<div class="dash-grid"><div class="dash-card"><div class="dash-num">${total}</div><div class="dash-lbl">Total de campanhas</div></div><div class="dash-card"><div class="dash-num">${ongoing}</div><div class="dash-lbl">Em andamento</div></div><div class="dash-card"><div class="dash-num">${done}</div><div class="dash-lbl">Finalizadas</div></div><div class="dash-card"><div class="dash-num">${planned}</div><div class="dash-lbl">Planejadas</div></div><div class="dash-card"><div class="dash-num">${campaigns.filter(c=>c.status==='Ideia').length}</div><div class="dash-lbl">Em ideação</div></div><div class="dash-card"><div class="dash-num">${campaigns.filter(c=>c.status==='Em produção').length}</div><div class="dash-lbl">Em produção</div></div></div><div class="bar-wrap"><div style="font-size:13px;font-weight:500;margin-bottom:12px">Campanhas por área</div>${Object.entries({fin:'Financeiro',ate:'Atendimento',aco:'Acordos',com:'Comercial'}).map(([k,n])=>`<div class="bar-row"><div class="bar-label">${n}</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(bc[k]/mx*100)}%;background:${BAR_COLORS[k]}"></div></div><div class="bar-count">${bc[k]}</div></div>`).join('')}</div><div class="bar-wrap"><div style="font-size:13px;font-weight:500;margin-bottom:12px">Próximas ações — Janeiro 2026</div>${campaigns.filter(c=>c.start<='2026-01-31').map(c=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,.08);cursor:pointer" onclick="openPanel(${c.id})"><span class="area-dot area-${c.area}"></span><span style="font-size:12px;flex:1">${c.title}</span><span style="font-size:11px;color:#aaa">${c.start}</span></div>`).join('')}</div>`;
}
function openPanel(id){
  const c=campaigns.find(x=>x.id===id);if(!c)return;
  document.getElementById('panel-title').textContent=c.title;
  document.getElementById('panel-body').innerHTML=`<div class="panel-field"><div class="panel-label">Área</div><span class="badge ${AREAS[c.area].badge}">${AREAS[c.area].name}</span></div><div class="panel-field"><div class="panel-label">Status</div><span class="badge badge-status">${c.status}</span></div><div class="panel-field"><div class="panel-label">Prioridade</div><span class="badge ${PRIO_BADGE[c.priority.toLowerCase()]||'badge-status'}">${c.priority}</span></div><div class="panel-field"><div class="panel-label">Tipo</div><div class="panel-value">${c.type}</div></div><div class="panel-field"><div class="panel-label">Responsável</div><div class="panel-value">${c.responsible}</div></div><div class="panel-field"><div class="panel-label">Período</div><div class="panel-value">${c.start}${c.end?' → '+c.end:''}</div></div><div class="panel-field"><div class="panel-label">Objetivo</div><div class="panel-value">${c.objective}</div></div><div class="panel-field"><div class="panel-label">Descrição</div><div class="panel-value" style="font-size:12px;color:#888">${c.description}</div></div><div class="panel-field"><div class="panel-label">Canais</div><div style="display:flex;flex-wrap:wrap;gap:4px">${c.channels.map(ch=>`<span class="badge badge-status">${ch}</span>`).join('')}</div></div><div style="display:flex;gap:6px;margin-top:12px"><button class="btn" onclick="openEditModal(${c.id})">Editar</button><button class="btn" onclick="duplicateCampaign(${c.id})">Duplicar</button><button class="btn" style="color:#a32d2d;border-color:#f7c1c1" onclick="deleteCampaign(${c.id})">Excluir</button></div><div style="margin-top:16px;border-top:0.5px solid rgba(0,0,0,.08);padding-top:12px"><div style="font-size:12px;font-weight:500;margin-bottom:8px">Comentários</div>${c.comments.length===0?'<div style="font-size:12px;color:#aaa">Nenhum comentário ainda.</div>':''}${c.comments.map(cm=>`<div style="background:#f5f5f0;border-radius:8px;padding:8px;margin-bottom:6px;font-size:12px"><strong style="font-size:11px">${cm.author}</strong> · <span style="color:#aaa">${cm.date}</span><div style="margin-top:4px">${cm.text}</div></div>`).join('')}<div style="margin-top:8px;display:flex;gap:6px"><input type="text" id="comment-input" class="form-input" placeholder="Adicione uma observação..." style="flex:1;font-size:12px"><button class="btn btn-primary" onclick="addComment(${c.id})">+</button></div></div>`;
  document.getElementById('side-panel').style.display='flex';
}
function closePanel(){document.getElementById('side-panel').style.display='none';}
function addComment(id){const input=document.getElementById('comment-input');if(!input.value.trim())return;campaigns.find(x=>x.id===id)?.comments.push({author:'Usuário interno',date:new Date().toLocaleDateString('pt-BR'),text:input.value.trim()});openPanel(id);}
function dayClick(ds){openNewModal(ds);}
function prevMonth(){if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--;renderView();}
function nextMonth(){if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++;renderView();}
function goToday(){currentMonth=new Date().getMonth();currentYear=new Date().getFullYear();renderView();}
function openNewModal(sd){showModal(null,sd,null);}
function openNewModalStatus(st){showModal(null,null,st);}
function openEditModal(id){showModal(campaigns.find(c=>c.id===id));}
function showModal(data,startDate,status){
  const isEdit=!!data,td=startDate||data?.start||`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
  document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>${isEdit?'Editar campanha':'Nova campanha'}</h3><div class="form-row"><label class="form-label">Nome da campanha *</label><input class="form-input" id="f-title" value="${data?.title||''}"></div><div class="form-row-2"><div class="form-row"><label class="form-label">Área</label><select class="form-input" id="f-area">${Object.entries(AREAS).map(([k,v])=>`<option value="${k}"${data?.area===k?' selected':''}>${v.name}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Tipo</label><select class="form-input" id="f-type">${['Comercial','Relacionamento','Cobrança','Retenção','Reativação','Datas comemorativas','Institucional','Operacional'].map(t=>`<option${data?.type===t?' selected':''}>${t}</option>`).join('')}</select></div></div><div class="form-row-2"><div class="form-row"><label class="form-label">Status</label><select class="form-input" id="f-status">${['Ideia','Planejada','Em produção','Em aprovação','Agendada','Em andamento','Finalizada','Cancelada'].map(s=>`<option${(data?.status||status)===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="form-row"><label class="form-label">Prioridade</label><select class="form-input" id="f-priority">${['Baixa','Média','Alta','Crítica'].map(p=>`<option${(data?.priority===p.toLowerCase()||data?.priority===p)?' selected':''}>${p}</option>`).join('')}</select></div></div><div class="form-row-2"><div class="form-row"><label class="form-label">Início</label><input type="date" class="form-input" id="f-start" value="${td}"></div><div class="form-row"><label class="form-label">Fim</label><input type="date" class="form-input" id="f-end" value="${data?.end||''}"></div></div><div class="form-row"><label class="form-label">Responsável</label><input class="form-input" id="f-responsible" value="${data?.responsible||''}"></div><div class="form-row"><label class="form-label">Objetivo</label><input class="form-input" id="f-objective" value="${data?.objective||''}"></div><div class="form-row"><label class="form-label">Descrição</label><textarea class="form-input" id="f-desc" rows="2" style="resize:vertical">${data?.description||''}</textarea></div><div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCampaign(${data?.id||'null'})">${isEdit?'Salvar':'Criar campanha'}</button></div></div></div>`;
}
function saveCampaign(editId){
  const title=document.getElementById('f-title').value.trim();if(!title)return;
  const obj={id:editId||nextId++,title,area:document.getElementById('f-area').value,type:document.getElementById('f-type').value,status:document.getElementById('f-status').value,priority:document.getElementById('f-priority').value.toLowerCase(),responsible:document.getElementById('f-responsible').value,start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,objective:document.getElementById('f-objective').value,description:document.getElementById('f-desc').value,channels:['WhatsApp'],comments:[]};
  if(editId){const i=campaigns.findIndex(c=>c.id===editId);if(i>=0){obj.comments=campaigns[i].comments;campaigns[i]=obj;}}else campaigns.push(obj);
  closeModal();updateCounts();renderView();if(editId)openPanel(editId);
}
function duplicateCampaign(id){const c=campaigns.find(x=>x.id===id);if(!c)return;campaigns.push({...c,id:nextId++,title:'Cópia — '+c.title,comments:[]});closePanel();updateCounts();renderView();}
function deleteCampaign(id){campaigns=campaigns.filter(c=>c.id!==id);closePanel();updateCounts();renderView();}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function updateCounts(){['fin','ate','aco','com'].forEach(k=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=campaigns.filter(c=>c.area===k).length;});}
setView('calendar');
</script>
</body>
</html>
